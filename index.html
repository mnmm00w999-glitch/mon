<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOON ❤️ YOYO</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#00000000,#ff006a);
        overflow:hidden;
    }

    .container{
        text-align:center;
        color:white;
    }

    .heart{
        position:relative;
        width:120px;
        height:120px;
        background:rgb(255, 0, 179);
        margin:0 auto 30px;
        transform:rotate(-45deg);
        animation:heartbeat 1s infinite;
    }

    .heart::before,
    .heart::after{
        content:"";
        position:absolute;
        width:120px;
        height:120px;
        background:rgb(182, 10, 216);
        border-radius:50%;
    }

    .heart::before{
        top:-60px;
        left:0;
    }

    .heart::after{
        left:60px;
        top:0;
    }

    h1{
        font-size:3rem;
        text-shadow:2px 2px 10px rgba(0,0,0,0.3);
    }

    p{
        font-size:1.3rem;
        margin-top:10px;
    }

    @keyframes heartbeat{
        0%,100%{
            transform:rotate(-45deg) scale(1);
        }
        50%{
            transform:rotate(-45deg) scale(1.15);
        }
    }
</style>
</head>
<body>

<div class="container">
    <div class="heart"></div>
    <h1>I Love You MY GIRLE FREIND3 ❤️</h1>
    <p>You make my world brighter every day.</p>
    <P>H ❤️B❤️ D❤️</P>
</div>

</body>
</html>
